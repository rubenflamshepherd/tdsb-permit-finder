name: Sync inventory

on:
  workflow_dispatch:
  schedule:
    # Daily at 08:15 UTC.
    - cron: "15 8 * * *"

permissions:
  contents: read

concurrency:
  group: sync-inventory-production
  cancel-in-progress: false

jobs:
  sync-inventory:
    name: Sync production inventory
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Sync inventory
        run: npm run sync:inventory
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PERMIT_TYPE_ID: ${{ vars.PERMIT_TYPE_ID || '3' }}
          TDSB_BASE_URL: ${{ vars.TDSB_BASE_URL || 'https://tdsb.ebasefm.com' }}
